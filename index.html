<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pipeline">
<meta name="theme-color" content="#0a1628">
<title>Parsons Pipeline Progress</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root {
  --navy:#0a1628; --navy2:#0f2040; --steel:#1a3a5c;
  --accent:#f59e0b; --muted:#7a9ab8; --text:#e8f0f8;
  --text2:#a0c0d8; --green:#22c55e; --card-bg:#0f2040;
  --border:rgba(255,255,255,0.08);
  --font:'Sora',sans-serif; --mono:'DM Mono',monospace;
}
body.sun {
  --navy:#f0f4f8; --navy2:#ffffff; --steel:#dbeafe;
  --accent:#f59e0b; --muted:#444; --text:#1a3a5c;
  --text2:#1a3a5c; --green:#15803d; --card-bg:#ffffff;
  --border:#1a3a5c; background:#f0f4f8;
}
body.sun::before { display:none; }
body.sun .header { background:#fff; border-bottom:3px solid #1a3a5c; }
body.sun .header::after { display:none; }
body.sun .header-eyebrow { color:#b45309; }
body.sun .header h1 { color:#1a3a5c; }
body.sun .header-sub { color:#444; }
body.sun .top-bar { background:#fff; border:2px solid #1a3a5c; }
body.sun .btn { background:#1a3a5c; color:#f59e0b; border:none; }
body.sun .task-card { background:#fff; border:2px solid #1a3a5c; }
body.sun .task-header { background:#1a3a5c; }
body.sun .task-name-static { color:#fff; }
body.sun input.task-name-input { color:#fff; }
body.sun input.task-name-input:focus { border-bottom-color:#f59e0b; }
body.sun .del-btn { color:rgba(255,255,255,0.7); }
body.sun .card-tabs { background:#e8f0f8; border-bottom:2px solid #1a3a5c; }
body.sun .card-tab { color:#444; font-weight:700; }
body.sun .card-tab.active { color:#1a3a5c; border-bottom-color:#f59e0b; background:#fff; }
body.sun .field-group { border-right:1px solid #cbd5e1; }
body.sun .field-group-title { color:#1a3a5c; }
body.sun .field-label { color:#444; font-weight:700; }
body.sun input.ci { background:#f0f6ff; border:2px solid #1a3a5c; color:#1a3a5c; font-weight:700; }
body.sun input.ci.start { background:#e8f0f8; color:#1a3a5c; }
body.sun input.ci:focus { background:#fff; border-color:#f59e0b; }
body.sun .ci-ro { color:#1a3a5c; border:2px solid #1a3a5c; }
body.sun .ci-ro.empty { color:#94a3b8; border-color:#cbd5e1; }
body.sun textarea.notes-input { color:#1a3a5c; }
body.sun textarea.notes-input::placeholder { color:#94a3b8; }
body.sun .insert-line { background:#1a3a5c; }
body.sun .insert-btn { color:#1a3a5c; border-color:rgba(26,58,92,0.4); background:rgba(26,58,92,0.06); }
body.sun .general-notes-card { background:#fff; border:2px solid #1a3a5c; }
body.sun .general-notes-header { background:#1a3a5c; }
body.sun textarea.general-notes-input { color:#1a3a5c; }
body.sun .add-task-btn { color:#1a3a5c; border-color:rgba(26,58,92,0.4); background:rgba(26,58,92,0.06); }
body.sun .section-label { color:#1a3a5c; }
body.sun .camera-btn { color:#1a3a5c; border-color:rgba(26,58,92,0.3); background:rgba(26,58,92,0.06); }

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:var(--font); background:var(--navy); color:var(--text); min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(245,158,11,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,158,11,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
.app { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:0 0 60px; }

.sun-toggle { position:fixed; top:12px; right:12px; z-index:1000; background:#1a3a5c; border:none; border-radius:99px; padding:7px 14px; font-size:13px; font-weight:700; color:#f59e0b; cursor:pointer; font-family:var(--font); touch-action:manipulation; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
body.sun .sun-toggle { background:#f59e0b; color:#1a3a5c; }

.header { background:linear-gradient(160deg,var(--navy2) 0%,var(--steel) 100%); padding:56px 20px 20px; border-bottom:1px solid var(--border); position:relative; overflow:hidden; }
.header::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
.header-eyebrow { font-size:10px; font-weight:600; letter-spacing:0.15em; color:var(--accent); text-transform:uppercase; margin-bottom:6px; font-family:var(--mono); }
.header h1 { font-size:22px; font-weight:700; color:var(--text); }
.header-sub { font-size:12px; color:var(--muted); margin-top:4px; font-family:var(--mono); }

.top-bar { margin:16px; background:var(--card-bg); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
.top-bar-inner { padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
.today-label { font-family:var(--mono); font-size:13px; font-weight:600; color:var(--text); }
.section-divider { height:1px; background:var(--border); }
.btn-row { padding:14px 16px; background:rgba(0,0,0,0.15); }
.btn { width:100%; font-family:var(--font); font-size:14px; font-weight:600; padding:14px; border-radius:10px; border:1px solid rgba(110,231,183,0.2); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; touch-action:manipulation; background:linear-gradient(135deg,#065f46,#047857); color:#6ee7b7; }
.btn:active { opacity:0.85; transform:scale(0.98); }

.section-label { font-size:10px; font-weight:600; letter-spacing:0.15em; color:var(--accent); text-transform:uppercase; font-family:var(--mono); padding:0 16px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
.add-task-btn { font-family:var(--mono); font-size:11px; padding:4px 12px; border-radius:6px; border:1px solid rgba(245,158,11,0.3); background:rgba(245,158,11,0.08); color:var(--accent); cursor:pointer; touch-action:manipulation; text-transform:none; letter-spacing:0; }

.cards { padding:0 16px; display:flex; flex-direction:column; gap:10px; }
.task-card { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.task-card.flash { animation:cardFlash 0.8s ease; }
@keyframes cardFlash { 0%{border-color:var(--green);box-shadow:0 0 0 1px var(--green);}100%{border-color:var(--border);box-shadow:none;} }
.task-header { padding:10px 14px; background:linear-gradient(90deg,var(--steel),var(--navy2)); display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); }
.task-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }
.task-name-static { font-size:13px; font-weight:600; color:var(--text); }
input.task-name-input { background:transparent; border:none; border-bottom:1px solid transparent; color:var(--text); font-family:var(--font); font-size:13px; font-weight:600; flex:1; outline:none; padding:0; min-width:0; }
input.task-name-input:focus { border-bottom-color:var(--accent); }
.del-btn { margin-left:auto; background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:0 4px; touch-action:manipulation; flex-shrink:0; }
.del-btn:active { color:#ef4444; }

.card-tabs { display:flex; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.15); }
.card-tab { flex:1; padding:8px 4px; font-size:11px; font-weight:600; font-family:var(--mono); text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); text-align:center; cursor:pointer; border:none; background:none; touch-action:manipulation; border-bottom:2px solid transparent; }
.card-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.card-pane { display:none; }
.card-pane.active { display:block; }

.fields { display:grid; grid-template-columns:1fr 1fr; }
.field-group { padding:12px 14px; border-right:1px solid var(--border); }
.field-group:last-child { border-right:none; }
.field-group-title { font-size:10px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:10px; font-family:var(--mono); }
.field-pair { display:flex; flex-direction:column; gap:8px; }
.field-item { display:flex; flex-direction:column; gap:3px; }
.field-label { font-size:10px; color:var(--muted); font-family:var(--mono); text-transform:uppercase; letter-spacing:0.06em; }
input.ci { width:100%; font-size:15px; font-family:var(--mono); border:1px solid var(--border); border-radius:7px; padding:9px 10px; background:var(--navy); color:var(--text); -webkit-appearance:none; }
input.ci.start { background:rgba(0,0,0,0.3); color:var(--text2); }
input.ci:focus { outline:none; border-color:var(--accent); color:var(--text); background:var(--navy2); }

textarea.notes-input { width:100%; min-height:90px; font-size:13px; font-family:var(--font); padding:12px 14px; background:transparent; border:none; color:var(--text); resize:none; outline:none; line-height:1.5; }
textarea.notes-input::placeholder { color:var(--steel); }

.photo-pane-inner { padding:12px 14px; }
.photo-thumb { width:100%; max-height:200px; object-fit:cover; border-radius:8px; border:1px solid var(--border); display:block; }
.photo-retake-btn { margin-top:8px; width:100%; font-family:var(--font); font-size:12px; padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--steel); color:var(--text2); cursor:pointer; touch-action:manipulation; }
.photo-empty { display:flex; flex-direction:column; align-items:center; gap:10px; padding:20px 0; }
.photo-empty-icon { font-size:34px; opacity:0.35; }
.photo-empty-txt { font-size:11px; color:var(--muted); font-family:var(--mono); }
.camera-btn { font-family:var(--font); font-size:13px; font-weight:600; padding:10px 20px; border-radius:10px; border:1px solid rgba(245,158,11,0.3); background:rgba(245,158,11,0.08); color:var(--accent); cursor:pointer; touch-action:manipulation; }
.thumb-badge { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); margin-left:4px; vertical-align:middle; }

.insert-row { display:flex; align-items:center; gap:8px; padding:4px 0; }
.insert-line { flex:1; height:1px; background:var(--border); }
.insert-btn { font-size:11px; font-family:var(--mono); padding:3px 12px; border-radius:99px; border:1px solid rgba(245,158,11,0.25); background:rgba(245,158,11,0.06); color:var(--accent); cursor:pointer; white-space:nowrap; touch-action:manipulation; flex-shrink:0; }

.general-notes-card { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin:0 16px; }
.general-notes-header { padding:10px 14px; background:linear-gradient(90deg,var(--steel),var(--navy2)); display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); }
textarea.general-notes-input { width:100%; min-height:100px; font-size:13px; font-family:var(--font); padding:14px; background:transparent; border:none; color:var(--text); resize:none; outline:none; line-height:1.6; }
textarea.general-notes-input::placeholder { color:var(--steel); }

.save-bar { position:fixed; bottom:0; left:0; right:0; z-index:999; display:flex; align-items:center; justify-content:center; padding:8px 16px; font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:0.05em; }
.save-bar.saved { background:rgba(21,128,61,0.92); color:#bbf7d0; }
.save-bar.saving { background:rgba(180,83,9,0.92); color:#fef3c7; }
.save-bar.error { background:rgba(185,28,28,0.92); color:#fee2e2; }

.report-overlay { display:none; position:fixed; inset:0; background:#fff; z-index:9999; flex-direction:column; }
.report-overlay.open { display:flex; }
.report-toolbar { display:flex; align-items:center; gap:10px; padding:14px 16px; background:#1a3a5c; flex-shrink:0; }
.report-toolbar-title { color:#f59e0b; font-size:13px; font-weight:600; flex:1; font-family:monospace; }
.report-close-btn { background:none; border:1px solid rgba(255,255,255,0.25); color:#fff; font-size:13px; padding:7px 14px; border-radius:8px; cursor:pointer; }
.report-save-btn { background:#f59e0b; border:none; color:#1a3a5c; font-size:13px; font-weight:700; padding:7px 16px; border-radius:8px; cursor:pointer; }
.report-body { flex:1; overflow-y:auto; padding:24px 20px; font-family:Arial,sans-serif; }
@media print { .report-toolbar { display:none !important; } }

#pdfModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:99999; align-items:center; justify-content:center; }
#pdfModal.open { display:flex; }
.pdf-box { background:#0f2040; border:1px solid rgba(255,255,255,0.12); border-radius:18px; padding:24px; max-width:320px; width:90%; }
.pdf-title { font-size:16px; font-weight:700; color:#e8f0f8; margin-bottom:4px; }
.pdf-sub { font-size:11px; color:#7a9ab8; font-family:var(--mono); margin-bottom:16px; }
.pdf-btn { width:100%; margin-bottom:10px; padding:14px; border-radius:10px; border:1px solid rgba(245,158,11,0.3); background:rgba(245,158,11,0.08); color:#f59e0b; font-family:var(--font); font-size:13px; font-weight:600; cursor:pointer; text-align:left; }
.pdf-btn-plain { width:100%; margin-bottom:10px; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.04); color:#e8f0f8; font-family:var(--font); font-size:12px; font-weight:600; cursor:pointer; text-align:left; }
.pdf-btn-sub { font-size:11px; font-weight:400; color:#7a9ab8; display:block; margin-top:2px; }
.pdf-divider { height:1px; background:rgba(255,255,255,0.08); margin:12px 0; }
.pdf-section-lbl { font-family:var(--mono); font-size:10px; color:#7a9ab8; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.1em; }
.pdf-cancel { width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:transparent; color:#7a9ab8; font-family:var(--font); font-size:13px; cursor:pointer; }
</style>
</head>
<body>

<button class="sun-toggle" id="sunBtn" onclick="toggleSun()">&#9728; Sunlight</button>

<div class="app">
  <div class="header">
    <div class="header-eyebrow">Parsons / Field Report</div>
    <h1>Pipeline Progress</h1>
    <div class="header-sub" id="todayLabel">Loading...</div>
  </div>

  <div style="height:16px"></div>

  <div class="top-bar">
    <div class="section-divider"></div>
    <div class="btn-row">
      <button class="btn" onclick="showReport()">&#8595; View &amp; Print Report</button>
    </div>
  </div>

  <div style="height:12px"></div>
  <div class="section-label">
    Tasks
    <button class="add-task-btn" onclick="addTask(-1)">+ Add task</button>
  </div>
  <div class="cards" id="cards"></div>

  <div style="height:16px"></div>
  <div class="section-label">General Notes</div>
  <div style="height:6px"></div>
  <div class="general-notes-card">
    <div class="general-notes-header">
      <div class="task-dot"></div>
      <span class="task-name-static">Site / General Notes</span>
    </div>
    <textarea class="general-notes-input" id="generalNotesEl" placeholder="Enter general site notes, observations, issues..."></textarea>
  </div>
</div>

<div class="save-bar saved" id="saveBar">&#10003; Saved</div>

<div class="report-overlay" id="reportOverlay">
  <div class="report-toolbar">
    <span class="report-toolbar-title">Pipeline Report</span>
    <button class="report-close-btn" onclick="closeReport()">X Close</button>
    <button class="report-save-btn" onclick="reportAction()">&#8595; Save PDF</button>
  </div>
  <div class="report-body" id="reportBody"></div>
</div>

<div id="pdfModal">
  <div class="pdf-box">
    <div class="pdf-title">Save Report as PDF</div>
    <div class="pdf-sub">Choose what to include</div>
    <button class="pdf-btn" onclick="generatePDF('full')">&#128196; Full Report<span class="pdf-btn-sub">Data + Notes + Photos</span></button>
    <button class="pdf-btn-plain" onclick="generatePDF('data')">&#128203; Data &amp; Notes Only<span class="pdf-btn-sub">No photos</span></button>
    <button class="pdf-btn-plain" onclick="generatePDF('photos')">&#128247; Photos Only<span class="pdf-btn-sub">Site photos with labels</span></button>
    <div class="pdf-divider"></div>
    <div class="pdf-section-lbl">Copy to clipboard (paste into Word)</div>
    <button class="pdf-btn-plain" onclick="copyToClipboard()">&#128203; Copy Report<span class="pdf-btn-sub">Table + notes - paste into Word</span></button>
    <div class="pdf-divider"></div>
    <button class="pdf-cancel" onclick="closePdfModal()">Cancel</button>
  </div>
</div>

<script>
// ---- DATA ----
var TASK_NAMES = ['Trenching','Pipelay','Welded','Tested','Sleeved','Diapered','Slurry'];
function blankTask(n){ return {name:n,stStart:'',stEnd:'',wjStart:'',wjEnd:'',notes:'',photo:''}; }
var TASKS = TASK_NAMES.map(blankTask);
var generalNotes = '';
var prevDayLabel = ''; // label for yesterday shown in report
var todayLabel = '';   // label for today shown in report
var saveTimer = null;
var appReady = false;

// ---- DATE HELPERS ----
function localMid(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function pad(n){ return String(n).padStart(2,'0'); }
function fmtISO(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmtNice(d){
  var D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return D[d.getDay()]+' '+d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear();
}

function updateTodayLabel(){
  var today = localMid(new Date());
  todayLabel = fmtNice(today);
  document.getElementById('todayLabel').innerText = 'Today: '+todayLabel;
}

// ---- SAVE STATUS ----
function setSaveStatus(status,msg){
  var bar=document.getElementById('saveBar');
  if(!bar) return;
  bar.className='save-bar '+status;
  bar.innerHTML=msg;
}
function debounceSave(){
  setSaveStatus('saving','&#8635; Saving...');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveState,300);
}

// ---- ESCAPE HTML ----
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ---- SYNC INPUTS ----
function syncLiveInputs(){
  document.querySelectorAll('input.ci').forEach(function(inp){
    if(inp.dataset.i!==undefined) TASKS[+inp.dataset.i][inp.dataset.f]=inp.value;
  });
  document.querySelectorAll('input.task-name-input').forEach(function(inp){
    if(inp.dataset.i!==undefined) TASKS[+inp.dataset.i].name=inp.value||'Unnamed';
  });
  document.querySelectorAll('textarea.notes-input').forEach(function(ta){
    if(ta.dataset.i!==undefined) TASKS[+ta.dataset.i].notes=ta.value;
  });
  var gn=document.getElementById('generalNotesEl');
  if(gn) generalNotes=gn.value;
}

// ---- RENDER CARDS ----
function renderCards(){
  var wrap=document.getElementById('cards');
  wrap.innerHTML='';
  TASKS.forEach(function(t,i){
    var ins=document.createElement('div');
    ins.className='insert-row';
    ins.innerHTML='<div class="insert-line"></div><button class="insert-btn" onclick="addTask('+i+')">+ insert here</button><div class="insert-line"></div>';
    wrap.appendChild(ins);

    var div=document.createElement('div');
    div.className='task-card';
    var badge=t.photo?'<span class="thumb-badge"></span>':'';
    var ph2=t.photo
      ?'<div class="photo-pane-inner"><img class="photo-thumb" src="'+t.photo+'" alt="'+esc(t.name)+'"><button class="photo-retake-btn" onclick="triggerCamera('+i+')">Retake Photo</button></div>'
      :'<div class="photo-pane-inner"><div class="photo-empty"><div class="photo-empty-icon">&#128247;</div><div class="photo-empty-txt">No photo yet</div><button class="camera-btn" onclick="triggerCamera('+i+')">&#128247; Take Photo</button></div></div>';

    div.innerHTML=
      '<div class="task-header"><div class="task-dot"></div><input class="task-name-input" data-i="'+i+'" value="'+esc(t.name)+'" placeholder="Task name"><button class="del-btn" onclick="deleteTask('+i+')">&#x2715;</button></div>'+
      '<div class="card-tabs">'+
        '<button class="card-tab active" onclick="switchTab(this,\'data\')">Data</button>'+
        '<button class="card-tab" onclick="switchTab(this,\'notes\')">Notes</button>'+
        '<button class="card-tab" onclick="switchTab(this,\'photo\')">Photo'+badge+'</button>'+
      '</div>'+
      '<div class="card-pane active" data-pane="data"><div class="fields">'+
        '<div class="field-group"><div class="field-group-title">Station</div><div class="field-pair">'+
          '<div class="field-item"><div class="field-label">Start</div><input class="ci start" data-i="'+i+'" data-f="stStart" value="'+esc(t.stStart)+'" placeholder="--"></div>'+
          '<div class="field-item"><div class="field-label">End</div><input class="ci" data-i="'+i+'" data-f="stEnd" value="'+esc(t.stEnd)+'" placeholder="enter"></div>'+
        '</div></div>'+
        '<div class="field-group"><div class="field-group-title">Pipe Count</div><div class="field-pair">'+

// ---- TABS ----
function switchTab(btn,pane){
  var card=btn.closest('.task-card');
  card.querySelectorAll('.card-tab').forEach(function(t){t.classList.remove('active');});
  card.querySelectorAll('.card-pane').forEach(function(p){p.classList.remove('active');});
  btn.classList.add('active');
  card.querySelector('[data-pane="'+pane+'"]').classList.add('active');
}

// ---- TASK MANAGEMENT ----
function addTask(beforeIndex){
  syncLiveInputs();
  var t=blankTask('New task');
  if(beforeIndex===-1){TASKS.push(t);}else{TASKS.splice(beforeIndex,0,t);}
  renderCards();
  var idx=beforeIndex===-1?TASKS.length-1:beforeIndex;
  setTimeout(function(){
    var inputs=document.querySelectorAll('input.task-name-input');
    if(inputs[idx]){inputs[idx].focus();inputs[idx].select();}
  },50);
  debounceSave();
}
function deleteTask(i){
  if(TASKS.length<=1){alert('Must have at least one task.');return;}
  if(!confirm('Remove "'+TASKS[i].name+'"?'))return;
  syncLiveInputs();
  TASKS.splice(i,1);
  renderCards();
  debounceSave();
}

// ---- CAMERA ----
function triggerCamera(i){var inp=document.getElementById('cam-'+i);if(inp)inp.click();}
function handlePhoto(event,i){
  var file=event.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var MAX=600;
      var scale=Math.min(MAX/img.width,MAX/img.height,1);
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      TASKS[i].photo=canvas.toDataURL('image/jpeg',0.6);
      renderCards();
      setTimeout(function(){
        var cards=document.querySelectorAll('.task-card');
        if(cards[i]){var pt=cards[i].querySelectorAll('.card-tab')[2];if(pt)switchTab(pt,'photo');}
      },50);
      saveState();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

// ---- GENERATE PDF ----
function generatePDF(mode){
  closePdfModal();closeReport();syncLiveInputs();
  var hasNotes=TASKS.some(function(t){return t.notes&&t.notes.trim();});
  var photoTasks=TASKS.filter(function(t){return t.photo;});
  var doc=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var pageW=doc.internal.pageSize.getWidth();
  var pageH=doc.internal.pageSize.getHeight();
  var margin=15;var y=margin;
  function hdr(sub){
    doc.setFillColor(26,58,92);doc.rect(0,0,pageW,28,'F');
    doc.setTextColor(245,158,11);doc.setFontSize(20);doc.setFont('helvetica','bold');doc.text('PARSONS',margin,12);
    doc.setFontSize(11);doc.setFont('helvetica','normal');doc.text(sub,margin,20);
    doc.setTextColor(200,220,240);doc.setFontSize(9);doc.text('Date: '+todayLabel,margin,26);
  }
  function ftr(){doc.setTextColor(150,150,150);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('Generated: '+new Date().toLocaleString(),margin,pageH-8);}
  function dataSection(){
    y=36;
    var head=[['Task','Sta Start','Sta End','PC Start','PC End']];
    if(hasNotes)head[0].push('Notes');
    var body=TASKS.map(function(t){var r=[t.name,t.stStart||'--',t.stEnd||'--',t.wjStart||'--',t.wjEnd||'--'];if(hasNotes)r.push(t.notes||'');return r;});
    doc.autoTable({startY:y,head:head,body:body,margin:{left:margin,right:margin},
      styles:{fontSize:9,cellPadding:3,valign:'middle'},
      headStyles:{fillColor:[26,58,92],textColor:[245,158,11],fontStyle:'bold',halign:'center'},
      columnStyles:{0:{fontStyle:'bold',halign:'left',cellWidth:hasNotes?28:36},1:{halign:'center',cellWidth:22},2:{halign:'center',cellWidth:22},3:{halign:'center',cellWidth:22},4:{halign:'center',cellWidth:22},5:{halign:'left',cellWidth:hasNotes?44:0}},
      alternateRowStyles:{fillColor:[240,246,252]},
      didParseCell:function(d){if(d.row.index%2===0&&d.section==='body')d.cell.styles.fillColor=[255,255,255];}
    });
    y=doc.lastAutoTable.finalY+8;
    if(generalNotes.trim()){
      if(y>240){doc.addPage();ftr();y=margin;}
      doc.setTextColor(26,58,92);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('General Notes',margin,y);y+=6;
      doc.setTextColor(60,60,60);doc.setFontSize(9);doc.setFont('helvetica','normal');
      var gl=doc.splitTextToSize(generalNotes,pageW-margin*2);doc.text(gl,margin,y);y+=gl.length*5+8;
    }
  }
  function photosSection(){
    if(!photoTasks.length){if(mode==='photos'){y=36;}doc.setTextColor(150,150,150);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text('No photos taken.',margin,y+10);return;}
    if(mode==='photos')y=36;
    if(y>200){doc.addPage();ftr();y=margin;}
    doc.setTextColor(26,58,92);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('Site Photos',margin,y);y+=8;
    var cols=2,gutter=6,cellW=(pageW-margin*2-gutter)/2,labelH=6,imgH=55,cellH=labelH+imgH+4;
    photoTasks.forEach(function(t,idx){
      var col=idx%cols,rowInPage=Math.floor(idx/cols)%2;
      if(idx>0&&idx%4===0){doc.addPage();ftr();y=margin;doc.setTextColor(26,58,92);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('Site Photos (continued)',margin,y);y+=8;}
      var x=margin+col*(cellW+gutter),cellY=y+rowInPage*(cellH+gutter);
      doc.setTextColor(26,58,92);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(t.name,x,cellY+4,{maxWidth:cellW});
      try{doc.addImage(t.photo,'JPEG',x,cellY+labelH,cellW,imgH,'','FAST');}
      catch(e){doc.setTextColor(150,150,150);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('[Photo unavailable]',x,cellY+labelH+imgH/2);}
      if((idx+1)%4===0){y=margin+16;}else if(idx===photoTasks.length-1){y+=(rowInPage+1)*(cellH+gutter)+4;}
    });
  }
  if(mode==='full'){hdr('Pipeline Progress Report - Full');dataSection();photosSection();ftr();doc.save('Parsons_Pipeline_Full_'+fmtISO(localMid(new Date()))+'.pdf');}
  else if(mode==='data'){hdr('Pipeline Progress Report - Data & Notes');dataSection();ftr();doc.save('Parsons_Pipeline_Data_'+fmtISO(localMid(new Date()))+'.pdf');}
  else if(mode==='photos'){hdr('Pipeline Progress Report - Site Photos');photosSection();ftr();doc.save('Parsons_Pipeline_Photos_'+fmtISO(localMid(new Date()))+'.pdf');}
}

// ---- INDEXEDDB STORAGE ----
var DB_NAME='ParsonsDB2';var DB_STORE='state';var db=null;

function openDB(cb){
  if(db){cb(db);return;}
  var req=indexedDB.open(DB_NAME,1);
  req.onupgradeneeded=function(e){
    var d=e.target.result;
    if(!d.objectStoreNames.contains(DB_STORE)) d.createObjectStore(DB_STORE,{keyPath:'id'});
  };
  req.onsuccess=function(e){db=e.target.result;cb(db);};
  req.onerror=function(){cb(null);};
}

function saveState(){
  syncLiveInputs();
  var today=localMid(new Date());
  var state={
    id:'main',
    savedDate:fmtISO(today),
    TASKS:TASKS.map(function(t){return {name:t.name,stStart:t.stStart,stEnd:t.stEnd,wjStart:t.wjStart,wjEnd:t.wjEnd,notes:t.notes,photo:t.photo};}),
    generalNotes:generalNotes
  };
  openDB(function(database){
    if(database){
      try{
        var tx=database.transaction(DB_STORE,'readwrite');
        tx.objectStore(DB_STORE).put(state);
        tx.oncomplete=function(){showSaved();};
        tx.onerror=function(){lsSave(state);};
      }catch(e){lsSave(state);}
    } else {lsSave(state);}
  });
}

function lsSave(state){
  try{
    var lite=JSON.parse(JSON.stringify(state));
    lite.TASKS=lite.TASKS.map(function(t){return {name:t.name,stStart:t.stStart,stEnd:t.stEnd,wjStart:t.wjStart,wjEnd:t.wjEnd,notes:t.notes,photo:''};});
    localStorage.setItem('parsons_ls',JSON.stringify(lite));
    showSaved();
  }catch(e){
    setSaveStatus('error','&#9888; Save failed - tap to retry');
    var bar=document.getElementById('saveBar');
    if(bar)bar.onclick=function(){saveState();this.onclick=null;};
  }
}

function showSaved(){
  var t=new Date(),h=t.getHours(),mi=String(t.getMinutes()).padStart(2,'0'),ap=h>=12?'PM':'AM';
  h=h%12||12;
  setSaveStatus('saved','&#10003; Saved '+h+':'+mi+' '+ap);
}

function loadState(cb){
  openDB(function(database){
    if(database){
      try{
        var tx=database.transaction(DB_STORE,'readonly');
        var req=tx.objectStore(DB_STORE).get('main');
        req.onsuccess=function(e){
          if(e.target.result){applyAndAdvance(e.target.result);cb(true);}
          else{lsLoad(cb);}
        };
        req.onerror=function(){lsLoad(cb);};
      }catch(e){lsLoad(cb);}
    } else {lsLoad(cb);}
  });
}

function lsLoad(cb){
  try{
    var raw=localStorage.getItem('parsons_ls');
    if(raw){applyAndAdvance(JSON.parse(raw));cb(true);}else{cb(false);}
  }catch(e){cb(false);}
}

function applyAndAdvance(s){
  var today=localMid(new Date());
  var todayISO=fmtISO(today);
  var savedDate=s.savedDate||'';

  // Load task data
  if(s.TASKS){
    TASKS.length=0;
    s.TASKS.forEach(function(t){TASKS.push({name:t.name,stStart:t.stStart,stEnd:t.stEnd,wjStart:t.wjStart,wjEnd:t.wjEnd,notes:t.notes,photo:t.photo||''},);});
  }
  if(s.generalNotes!==undefined) generalNotes=s.generalNotes;

  // If saved on a PREVIOUS day, shift ends to starts
  if(savedDate && savedDate !== todayISO){
    TASKS.forEach(function(t){
      if(t.stEnd||t.wjEnd){
        t.stStart=t.stEnd;t.stEnd='';
        t.wjStart=t.wjEnd;t.wjEnd='';
      } else {
        t.stEnd='';t.wjEnd='';
      }
      t.photo='';
      t.notes='';
    });
    generalNotes='';
    // Save immediately with today's date
    saveState();
  }
}
