<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pipeline">
<meta name="theme-color" content="#0a1628">
<title>Parsons Pipeline Progress</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy2: #0f2040;
  --steel: #1a3a5c;
  --accent: #f59e0b;
  --muted: #7a9ab8;
  --text: #e8f0f8;
  --text2: #a0c0d8;
  --green: #22c55e;
  --card-bg: #0f2040;
  --border: rgba(255,255,255,0.08);
  --font: 'Sora', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--navy); color: var(--text); min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
.app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

/* Header */
.header { background: linear-gradient(160deg, var(--navy2) 0%, var(--steel) 100%); padding: 56px 20px 24px; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.header::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
.header-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; font-family: var(--mono); }
.header h1 { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.2; }
.header-sub { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

/* Date */
.date-section { margin: 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.date-inner { padding: 14px 16px; }
.date-stepper { display: flex; align-items: stretch; background: var(--steel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; height: 52px; }
.step-btn { width: 56px; background: transparent; border: none; color: var(--accent); font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; touch-action: manipulation; }
.step-btn:active { background: rgba(245,158,11,0.22); }
.step-sep { width: 1px; background: var(--border); flex-shrink: 0; }
.date-display { flex: 1; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 13px; color: var(--text); user-select: none; text-align: center; }
.section-divider { height: 1px; background: var(--border); }
.btn-row { padding: 14px 16px; background: rgba(0,0,0,0.15); }
.btn { width: 100%; font-family: var(--font); font-size: 14px; font-weight: 600; padding: 14px; border-radius: 10px; border: 1px solid rgba(110,231,183,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; touch-action: manipulation; background: linear-gradient(135deg, #065f46, #047857); color: #6ee7b7; }
.btn:active { opacity: 0.85; transform: scale(0.98); }

/* Mode bar */
.mode-bar { display: none; margin: 0 16px; padding: 8px 14px; background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); border-radius: 10px; font-family: var(--mono); font-size: 11px; color: var(--accent); text-align: center; }
.mode-bar.visible { display: block; }

/* Section label */
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; font-family: var(--mono); padding: 0 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.add-task-btn { font-family: var(--mono); font-size: 11px; padding: 4px 12px; border-radius: 6px; border: 1px solid rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); color: var(--accent); cursor: pointer; touch-action: manipulation; text-transform: none; letter-spacing: 0; }

/* Cards */
.cards { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
.task-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.task-card.flash { animation: cardFlash 0.8s ease; }
@keyframes cardFlash { 0% { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); } 100% { border-color: var(--border); box-shadow: none; } }
.task-header { padding: 10px 14px; background: linear-gradient(90deg, var(--steel), var(--navy2)); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
.task-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.task-name-static { font-size: 13px; font-weight: 600; color: var(--text); }
input.task-name-input { background: transparent; border: none; border-bottom: 1px solid transparent; color: var(--text); font-family: var(--font); font-size: 13px; font-weight: 600; flex: 1; outline: none; padding: 0; min-width: 0; }
input.task-name-input:focus { border-bottom-color: var(--accent); }
.del-btn { margin-left: auto; background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 0 4px; touch-action: manipulation; flex-shrink: 0; }
.del-btn:active { color: #ef4444; }

/* Tabs */
.card-tabs { display: flex; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.15); }
.card-tab { flex: 1; padding: 8px 4px; font-size: 11px; font-weight: 600; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); text-align: center; cursor: pointer; border: none; background: none; touch-action: manipulation; border-bottom: 2px solid transparent; }
.card-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.card-pane { display: none; }
.card-pane.active { display: block; }

/* Fields */
.fields { display: grid; grid-template-columns: 1fr 1fr; }
.field-group { padding: 12px 14px; border-right: 1px solid var(--border); }
.field-group:last-child { border-right: none; }
.field-group-title { font-size: 10px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; font-family: var(--mono); }
.field-pair { display: flex; flex-direction: column; gap: 8px; }
.field-item { display: flex; flex-direction: column; gap: 3px; }
.field-label { font-size: 10px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
input.ci { width: 100%; font-size: 15px; font-family: var(--mono); border: 1px solid var(--border); border-radius: 7px; padding: 9px 10px; background: var(--navy); color: var(--text); -webkit-appearance: none; }
input.ci.start { background: rgba(0,0,0,0.3); color: var(--text2); }
input.ci:focus { outline: none; border-color: var(--accent); color: var(--text); background: var(--navy2); }
.ci-ro { font-size: 15px; font-family: var(--mono); border: 1px solid var(--border); border-radius: 7px; padding: 9px 10px; color: var(--text2); min-height: 38px; display: block; }
.ci-ro.start { color: var(--muted); }
.ci-ro.empty { color: var(--steel); }

/* Notes */
textarea.notes-input { width: 100%; min-height: 90px; font-size: 13px; font-family: var(--font); padding: 12px 14px; background: transparent; border: none; color: var(--text); resize: none; outline: none; line-height: 1.5; }
textarea.notes-input::placeholder { color: var(--steel); }
.notes-ro { font-size: 13px; padding: 12px 14px; color: var(--text2); line-height: 1.5; min-height: 50px; white-space: pre-wrap; }
.notes-ro.empty { color: var(--steel); font-style: italic; }

/* Photo */
.photo-pane-inner { padding: 12px 14px; }
.photo-thumb { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); display: block; }
.photo-retake-btn { margin-top: 8px; width: 100%; font-family: var(--font); font-size: 12px; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--steel); color: var(--text2); cursor: pointer; touch-action: manipulation; }
.photo-empty { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px 0; }
.photo-empty-icon { font-size: 34px; opacity: 0.35; }
.photo-empty-txt { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.camera-btn { font-family: var(--font); font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); color: var(--accent); cursor: pointer; touch-action: manipulation; }
.camera-btn:active { background: rgba(245,158,11,0.2); }
.thumb-badge { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-left: 4px; vertical-align: middle; }

/* Insert row */
.insert-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.insert-line { flex: 1; height: 1px; background: var(--border); }
.insert-btn { font-size: 11px; font-family: var(--mono); padding: 3px 12px; border-radius: 99px; border: 1px solid rgba(245,158,11,0.25); background: rgba(245,158,11,0.06); color: var(--accent); cursor: pointer; white-space: nowrap; touch-action: manipulation; flex-shrink: 0; }

/* General notes */
.general-notes-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin: 0 16px; }
.general-notes-header { padding: 10px 14px; background: linear-gradient(90deg, var(--steel), var(--navy2)); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
textarea.general-notes-input { width: 100%; min-height: 120px; font-size: 13px; font-family: var(--font); padding: 14px; background: transparent; border: none; color: var(--text); resize: none; outline: none; line-height: 1.6; }
textarea.general-notes-input::placeholder { color: var(--steel); }

/* Report overlay */
.report-overlay { display: none; position: fixed; inset: 0; background: #fff; z-index: 9999; flex-direction: column; }
.report-overlay.open { display: flex; }
.report-toolbar { display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: #1a3a5c; flex-shrink: 0; }
.report-toolbar-title { color: #f59e0b; font-size: 13px; font-weight: 600; flex: 1; font-family: monospace; }
.report-close-btn { background: none; border: 1px solid rgba(255,255,255,0.25); color: #fff; font-size: 13px; padding: 7px 14px; border-radius: 8px; cursor: pointer; touch-action: manipulation; }
.report-print-btn { background: #f59e0b; border: none; color: #1a3a5c; font-size: 13px; font-weight: 700; padding: 7px 16px; border-radius: 8px; cursor: pointer; touch-action: manipulation; }
.report-body { flex: 1; overflow-y: auto; padding: 24px 20px; color: #111; font-family: Arial, sans-serif; }
.report-body h1 { color: #1a3a5c; font-size: 22px; margin-bottom: 4px; }
.report-body h2 { color: #333; font-size: 16px; font-weight: normal; margin-bottom: 4px; }
.report-dates { color: #555; font-size: 12px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #1a3a5c; }
.report-body table { border-collapse: collapse; width: 100%; margin-bottom: 8px; }
.r-hdr { background: #1a3a5c; color: #f59e0b; font-weight: bold; padding: 8px 10px; border: 1px solid #999; text-align: center; font-size: 13px; }
.r-sub { background: #d6e4f0; color: #1a3a5c; font-weight: bold; padding: 6px 10px; border: 1px solid #999; text-align: center; font-size: 12px; }
.r-data { padding: 7px 10px; border: 1px solid #ccc; font-size: 13px; }
.r-name { font-weight: 600; }
.r-val { text-align: center; font-family: 'Courier New', monospace; }
.r-note { font-size: 12px; color: #333; }
.report-body h3 { color: #1a3a5c; margin-top: 24px; margin-bottom: 8px; font-size: 15px; }
.notes-box { border: 1px solid #ccc; border-radius: 4px; padding: 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; color: #333; }
.photo-section { margin-bottom: 20px; }
.photo-section-label { font-weight: 600; color: #1a3a5c; font-size: 13px; margin-bottom: 6px; font-family: Arial; }
.photo-section img { max-width: 100%; border-radius: 4px; border: 1px solid #ccc; display: block; }
.report-footer { color: #999; font-size: 11px; margin-top: 20px; padding-top: 10px; border-top: 1px solid #eee; }
@media print { .report-toolbar { display: none !important; } }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-eyebrow">Parsons / Field Report</div>
    <h1>Pipeline Progress</h1>
    <div class="header-sub">Transmission Line Tracker v3.0</div>
  </div>

  <div style="height:16px"></div>

  <div class="date-section">
    <div class="date-inner">
      <div class="date-stepper">
        <button class="step-btn" onclick="stepDate(-1)">&#8722;</button>
        <div class="step-sep"></div>
        <div class="date-display" id="dateDisplay">--</div>
        <div class="step-sep"></div>
        <button class="step-btn" onclick="stepDate(1)">+</button>
      </div>
    </div>
    <div class="section-divider"></div>
    <div class="btn-row">
      <button class="btn" onclick="showReport()">&#8595; View &amp; Print Report</button>
    </div>
  </div>

  <div style="height:10px"></div>
  <div class="mode-bar" id="modebar">Viewing saved entry -- tap + to return to today</div>
  <div style="height:12px"></div>

  <div class="section-label">
    Tasks
    <button class="add-task-btn" onclick="addTask(-1)">+ Add task</button>
  </div>
  <div class="cards" id="cards"></div>

  <div style="height:16px"></div>
  <div class="section-label">General Notes</div>
  <div style="height:6px"></div>
  <div class="general-notes-card">
    <div class="general-notes-header">
      <div class="task-dot"></div>
      <span class="task-name-static">Site / General Notes</span>
    </div>
    <textarea class="general-notes-input" id="generalNotesEl" placeholder="Enter general site notes, observations, issues..."></textarea>
  </div>

</div>

<!-- Report overlay -->
<div class="report-overlay" id="reportOverlay">
  <div class="report-toolbar">
    <span class="report-toolbar-title">Pipeline Report</span>
    <button class="report-close-btn" onclick="closeReport()">X Close</button>
    <button class="report-print-btn" id="reportActionBtn" onclick="reportAction()">&#8595; Save PDF</button>
  </div>
  <div class="report-body" id="reportBody"></div>
</div>

<script>
var TASK_NAMES = ['Trenching','Pipelay','Welded','Tested','Sleeved','Diapered','Slurry'];

function blankTask(name) {
  return {name:name, stStart:'', stEnd:'', wjStart:'', wjEnd:'', notes:'', photo:''};
}
function blankTasks() {
  return TASK_NAMES.map(function(n){ return blankTask(n); });
}

var TASKS = blankTasks();
var dayLog = [];
var viewIndex = -1;
var generalNotes = '';
var currDate, prevDate;

// Date helpers
function localMid(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function addDays(d,n) { var r=localMid(d); r.setDate(r.getDate()+n); return r; }
function pad(n) { return String(n).padStart(2,'0'); }
function fmtISO(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmtNice(d) {
  var D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return D[d.getDay()]+' '+d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear();
}

function initDates() {
  currDate = localMid(new Date());
  prevDate = addDays(currDate,-1);
  updateDateDisplay();
}

function updateDateDisplay() {
  var el = document.getElementById('dateDisplay');
  var mb = document.getElementById('modebar');
  if (viewIndex === -1) {
    el.innerText = fmtNice(currDate);
    mb.classList.remove('visible');
  } else {
    el.innerText = dayLog[viewIndex].date;
    mb.classList.add('visible');
  }
}

function stepDate(delta) {
  if (viewIndex === -1) {
    if (delta === 1) {
      saveAndAdvance();
    } else {
      if (dayLog.length > 0) {
        viewIndex = dayLog.length - 1;
        updateDateDisplay();
        renderCards(dayLog[viewIndex].tasks, true);
      } else {
        currDate = addDays(currDate,-1);
        prevDate = addDays(currDate,-1);
        updateDateDisplay();
      }
    }
  } else {
    if (delta === -1 && viewIndex > 0) {
      viewIndex--;
      updateDateDisplay();
      renderCards(dayLog[viewIndex].tasks, true);
    } else if (delta === 1) {
      if (viewIndex < dayLog.length-1) {
        viewIndex++;
        updateDateDisplay();
        renderCards(dayLog[viewIndex].tasks, true);
      } else {
        viewIndex = -1;
        updateDateDisplay();
        renderCards(TASKS, false);
      }
    }
  }
}

function syncLiveInputs() {
  document.querySelectorAll('input.ci').forEach(function(inp) {
    if (inp.dataset.i !== undefined) TASKS[+inp.dataset.i][inp.dataset.f] = inp.value;
  });
  document.querySelectorAll('input.task-name-input').forEach(function(inp) {
    if (inp.dataset.i !== undefined) TASKS[+inp.dataset.i].name = inp.value || 'Unnamed';
  });
  document.querySelectorAll('textarea.notes-input').forEach(function(ta) {
    if (ta.dataset.i !== undefined) TASKS[+ta.dataset.i].notes = ta.value;
  });
  var gn = document.getElementById('generalNotesEl');
  if (gn) generalNotes = gn.value;
}

function saveAndAdvance() {
  syncLiveInputs();
  var snapshot = {
    prevDate: fmtNice(prevDate),
    date: fmtNice(currDate),
    generalNotes: generalNotes,
    tasks: TASKS.map(function(t){ return {name:t.name,stStart:t.stStart,stEnd:t.stEnd,wjStart:t.wjStart,wjEnd:t.wjEnd,notes:t.notes,photo:t.photo}; })
  };
  dayLog.push(snapshot);
  var moved = [];
  TASKS.forEach(function(t,i) {
    if (t.stEnd || t.wjEnd) moved.push(i);
    t.stStart = t.stEnd; t.stEnd = '';
    t.wjStart = t.wjEnd; t.wjEnd = '';
  });
  prevDate = localMid(currDate);
  currDate = addDays(currDate,1);
  viewIndex = -1;
  updateDateDisplay();
  renderCards(TASKS, false);
  if (moved.length) {
    document.querySelectorAll('.task-card').forEach(function(el,i) {
      if (moved.indexOf(i) !== -1) {
        el.classList.add('flash');
        setTimeout(function(){ el.classList.remove('flash'); }, 900);
      }
    });
  }
  saveState();
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCards(tasks, readonly) {
  var wrap = document.getElementById('cards');
  wrap.innerHTML = '';

  tasks.forEach(function(t,i) {
    if (!readonly) {
      var ins = document.createElement('div');
      ins.className = 'insert-row';
      ins.innerHTML = '<div class="insert-line"></div><button class="insert-btn" onclick="addTask('+i+')">+ insert here</button><div class="insert-line"></div>';
      wrap.appendChild(ins);
    }

    var div = document.createElement('div');
    div.className = 'task-card';
    var badge = t.photo ? '<span class="thumb-badge"></span>' : '';

    if (readonly) {
      var photoHtml = t.photo
        ? '<div class="photo-pane-inner"><img class="photo-thumb" src="'+t.photo+'" alt="'+esc(t.name)+'"></div>'
        : '<div class="photo-pane-inner"><div class="photo-empty"><div class="photo-empty-icon">&#128247;</div><div class="photo-empty-txt">No photo</div></div></div>';

      div.innerHTML =
        '<div class="task-header"><div class="task-dot"></div><span class="task-name-static">'+esc(t.name)+'</span></div>'+
        '<div class="card-tabs">'+
          '<button class="card-tab active" onclick="switchTab(this,\'data\')">Data</button>'+
          '<button class="card-tab" onclick="switchTab(this,\'notes\')">Notes</button>'+
          '<button class="card-tab" onclick="switchTab(this,\'photo\')">Photo'+badge+'</button>'+
        '</div>'+
        '<div class="card-pane active" data-pane="data">'+
          '<div class="fields">'+
            '<div class="field-group">'+
              '<div class="field-group-title">Station</div>'+
              '<div class="field-pair">'+
                '<div class="field-item"><div class="field-label">Start</div><div class="ci-ro start'+(t.stStart?'':' empty')+'">'+esc(t.stStart||'--')+'</div></div>'+
                '<div class="field-item"><div class="field-label">End</div><div class="ci-ro'+(t.stEnd?'':' empty')+'">'+esc(t.stEnd||'--')+'</div></div>'+
              '</div>'+
            '</div>'+
            '<div class="field-group">'+
              '<div class="field-group-title">Weld / Joint #</div>'+
              '<div class="field-pair">'+
                '<div class="field-item"><div class="field-label">Start</div><div class="ci-ro start'+(t.wjStart?'':' empty')+'">'+esc(t.wjStart||'--')+'</div></div>'+
                '<div class="field-item"><div class="field-label">End</div><div class="ci-ro'+(t.wjEnd?'':' empty')+'">'+esc(t.wjEnd||'--')+'</div></div>'+
              '</div>'+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div class="card-pane" data-pane="notes"><div class="notes-ro'+(t.notes?'':' empty')+'">'+esc(t.notes||'No notes.')+'</div></div>'+
        '<div class="card-pane" data-pane="photo">'+photoHtml+'</div>';
    } else {
      var photoHtml2 = t.photo
        ? '<div class="photo-pane-inner"><img class="photo-thumb" src="'+t.photo+'" alt="'+esc(t.name)+'"><button class="photo-retake-btn" onclick="triggerCamera('+i+')">Retake Photo</button></div>'
        : '<div class="photo-pane-inner"><div class="photo-empty"><div class="photo-empty-icon">&#128247;</div><div class="photo-empty-txt">No photo yet</div><button class="camera-btn" onclick="triggerCamera('+i+')">&#128247; Take Photo</button></div></div>';

      div.innerHTML =
        '<div class="task-header">'+
          '<div class="task-dot"></div>'+
          '<input class="task-name-input" data-i="'+i+'" value="'+esc(t.name)+'" placeholder="Task name">'+
          '<button class="del-btn" onclick="deleteTask('+i+')">&#x2715;</button>'+
        '</div>'+
        '<div class="card-tabs">'+
          '<button class="card-tab active" onclick="switchTab(this,\'data\')">Data</button>'+
          '<button class="card-tab" onclick="switchTab(this,\'notes\')">Notes</button>'+
          '<button class="card-tab" onclick="switchTab(this,\'photo\')">Photo'+badge+'</button>'+
        '</div>'+
        '<div class="card-pane active" data-pane="data">'+
          '<div class="fields">'+
            '<div class="field-group">'+
              '<div class="field-group-title">Station</div>'+
              '<div class="field-pair">'+
                '<div class="field-item"><div class="field-label">Start</div><input class="ci start" data-i="'+i+'" data-f="stStart" value="'+esc(t.stStart)+'" placeholder="--"></div>'+
                '<div class="field-item"><div class="field-label">End</div><input class="ci" data-i="'+i+'" data-f="stEnd" value="'+esc(t.stEnd)+'" placeholder="enter"></div>'+
              '</div>'+
            '</div>'+
            '<div class="field-group">'+
              '<div class="field-group-title">Weld / Joint #</div>'+
              '<div class="field-pair">'+
                '<div class="field-item"><div class="field-label">Start</div><input class="ci start" data-i="'+i+'" data-f="wjStart" value="'+esc(t.wjStart)+'" placeholder="--"></div>'+
                '<div class="field-item"><div class="field-label">End</div><input class="ci" data-i="'+i+'" data-f="wjEnd" value="'+esc(t.wjEnd)+'" placeholder="enter"></div>'+
              '</div>'+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div class="card-pane" data-pane="notes"><textarea class="notes-input" data-i="'+i+'" placeholder="Notes for '+esc(t.name)+'...">'+esc(t.notes)+'</textarea></div>'+
        '<div class="card-pane" data-pane="photo">'+photoHtml2+'</div>'+
        '<input type="file" accept="image/*" capture="environment" id="cam-'+i+'" style="display:none" onchange="handlePhoto(event,'+i+')">';
    }

    wrap.appendChild(div);
  });

  if (!readonly) {
    var ins2 = document.createElement('div');
    ins2.className = 'insert-row';
    ins2.style.marginTop = '4px';
    ins2.innerHTML = '<div class="insert-line"></div><button class="insert-btn" onclick="addTask(-1)">+ add at end</button><div class="insert-line"></div>';
    wrap.appendChild(ins2);

    wrap.querySelectorAll('input.ci').forEach(function(inp) {
      inp.addEventListener('input', function(e) {
        TASKS[+e.target.dataset.i][e.target.dataset.f] = e.target.value;
        debounceSave();
      });
    });
    wrap.querySelectorAll('input.task-name-input').forEach(function(inp) {
      inp.addEventListener('input', function(e) {
        TASKS[+e.target.dataset.i].name = e.target.value || 'Unnamed';
        debounceSave();
      });
    });
    wrap.querySelectorAll('textarea.notes-input').forEach(function(ta) {
      ta.addEventListener('input', function(e) {
        TASKS[+e.target.dataset.i].notes = e.target.value;
        debounceSave();
      });
    });
  }
}

function switchTab(btn, pane) {
  var card = btn.closest('.task-card');
  card.querySelectorAll('.card-tab').forEach(function(t){ t.classList.remove('active'); });
  card.querySelectorAll('.card-pane').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  card.querySelector('[data-pane="'+pane+'"]').classList.add('active');
}

function addTask(beforeIndex) {
  syncLiveInputs();
  var newTask = blankTask('New task');
  if (beforeIndex === -1) { TASKS.push(newTask); } else { TASKS.splice(beforeIndex,0,newTask); }
  renderCards(TASKS, false);
  var idx = beforeIndex === -1 ? TASKS.length-1 : beforeIndex;
  setTimeout(function() {
    var inputs = document.querySelectorAll('input.task-name-input');
    if (inputs[idx]) { inputs[idx].focus(); inputs[idx].select(); }
  }, 50);
  saveState();
}

function deleteTask(i) {
  if (TASKS.length <= 1) { alert('Must have at least one task.'); return; }
  if (!confirm('Remove "'+TASKS[i].name+'"?')) return;
  syncLiveInputs();
  TASKS.splice(i,1);
  renderCards(TASKS, false);
  saveState();
}

function triggerCamera(i) {
  var inp = document.getElementById('cam-'+i);
  if (inp) inp.click();
}

function handlePhoto(event, i) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var MAX = 800;
      var scale = Math.min(MAX/img.width, MAX/img.height, 1);
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      TASKS[i].photo = canvas.toDataURL('image/jpeg', 0.7);
      renderCards(TASKS, false);
      setTimeout(function() {
        var cards = document.querySelectorAll('.task-card');
        if (cards[i]) {
          var photoTab = cards[i].querySelectorAll('.card-tab')[2];
          if (photoTab) switchTab(photoTab, 'photo');
        }
      }, 50);
      saveState();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function reportAction() {
  syncLiveInputs();
  var activeTasks = viewIndex === -1 ? TASKS : dayLog[viewIndex].tasks;
  var prevStr = viewIndex === -1 ? fmtNice(prevDate) : dayLog[viewIndex].prevDate;
  var currStr = viewIndex === -1 ? fmtNice(currDate) : dayLog[viewIndex].date;
  var gn = viewIndex === -1 ? generalNotes : (dayLog[viewIndex].generalNotes || '');
  var hasNotes = activeTasks.some(function(t){ return t.notes && t.notes.trim(); });

  var doc = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  var pageW = doc.internal.pageSize.getWidth();
  var margin = 15;
  var y = margin;

  // Header
  doc.setFillColor(26, 58, 92);
  doc.rect(0, 0, pageW, 28, 'F');
  doc.setTextColor(245, 158, 11);
  doc.setFontSize(20);
  doc.setFont('helvetica', 'bold');
  doc.text('PARSONS', margin, 12);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'normal');
  doc.text('Pipeline Progress Report', margin, 20);
  doc.setTextColor(200, 220, 240);
  doc.setFontSize(9);
  doc.text('Previous: ' + prevStr + '   |   Current: ' + currStr, margin, 26);
  y = 36;

  // Main table
  var hasNotesCols = hasNotes;
  var head = [['Task', 'St. Start', 'St. End', 'Wj. Start', 'Wj. End']];
  if (hasNotesCols) head[0].push('Notes');

  var body = activeTasks.map(function(t) {
    var row = [t.name, t.stStart||'--', t.stEnd||'--', t.wjStart||'--', t.wjEnd||'--'];
    if (hasNotesCols) row.push(t.notes||'');
    return row;
  });

  doc.autoTable({
    startY: y,
    head: head,
    body: body,
    margin: { left: margin, right: margin },
    styles: { fontSize: 9, cellPadding: 3, valign: 'middle' },
    headStyles: { fillColor: [26,58,92], textColor: [245,158,11], fontStyle: 'bold', halign: 'center' },
    columnStyles: {
      0: { fontStyle: 'bold', halign: 'left', cellWidth: hasNotesCols ? 28 : 36 },
      1: { halign: 'center', cellWidth: 22 },
      2: { halign: 'center', cellWidth: 22 },
      3: { halign: 'center', cellWidth: 22 },
      4: { halign: 'center', cellWidth: 22 },
      5: { halign: 'left', cellWidth: hasNotesCols ? 44 : 0 }
    },
    alternateRowStyles: { fillColor: [240, 246, 252] },
    didParseCell: function(data) {
      if (data.row.index % 2 === 0 && data.section === 'body') {
        data.cell.styles.fillColor = [255,255,255];
      }
    }
  });

  y = doc.lastAutoTable.finalY + 8;

  // General notes
  if (gn.trim()) {
    if (y > 240) { doc.addPage(); y = margin; }
    doc.setTextColor(26,58,92);
    doc.setFontSize(11);
    doc.setFont('helvetica','bold');
    doc.text('General Notes', margin, y);
    y += 6;
    doc.setTextColor(60,60,60);
    doc.setFontSize(9);
    doc.setFont('helvetica','normal');
    var gnLines = doc.splitTextToSize(gn, pageW - margin*2);
    doc.text(gnLines, margin, y);
    y += gnLines.length * 5 + 8;
  }

  // Site photos — add each on its own section
  var photoTasks = activeTasks.filter(function(t){ return t.photo; });
  if (photoTasks.length > 0) {
    if (y > 200) { doc.addPage(); y = margin; }
    doc.setTextColor(26,58,92);
    doc.setFontSize(11);
    doc.setFont('helvetica','bold');
    doc.text('Site Photos', margin, y);
    y += 8;

    photoTasks.forEach(function(t) {
      if (y > 220) { doc.addPage(); y = margin; }
      // Task name above photo
      doc.setTextColor(26,58,92);
      doc.setFontSize(10);
      doc.setFont('helvetica','bold');
      doc.text(t.name, margin, y);
      y += 5;
      // Add image
      try {
        var imgW = pageW - margin*2;
        var imgH = 80; // max height in mm
        doc.addImage(t.photo, 'JPEG', margin, y, imgW, imgH, '', 'FAST');
        y += imgH + 10;
      } catch(e) {
        doc.setTextColor(150,150,150);
        doc.setFontSize(8);
        doc.text('[Photo could not be embedded]', margin, y);
        y += 8;
      }
    });
  }

  // Footer
  doc.setTextColor(150,150,150);
  doc.setFontSize(8);
  doc.setFont('helvetica','normal');
  doc.text('Generated: ' + new Date().toLocaleString(), margin, doc.internal.pageSize.getHeight() - 8);

  // Save
  var filename = 'Parsons_Pipeline_' + fmtISO(viewIndex===-1?currDate:new Date()) + '.pdf';
  doc.save(filename);
}

    '<div style="color:#555;font-size:13px;margin-bottom:24px;padding-bottom:12px;border-bottom:3px solid #1a3a5c;">'+
      'Previous date: <strong>'+prevStr+'</strong> &nbsp;&nbsp;|&nbsp;&nbsp; Current date: <strong>'+currStr+'</strong>'+
    '</div>'+
    '<table style="border-collapse:collapse;width:100%;margin-bottom:24px;">'+
      '<tr>'+
        '<td style="background:#1a3a5c;color:#f59e0b;font-weight:bold;padding:10px 12px;border:1px solid #999;text-align:left;font-size:13px;vertical-align:middle;" rowspan="2">Task</td>'+

function closeReport() {
  document.getElementById('reportOverlay').classList.remove('open');
}

// Persistence
var STORAGE_KEY = 'parsons_v2';
var saveTimer = null;

function debounceSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 1500);
}

function saveState() {
  try {
    syncLiveInputs();
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      TASKS: TASKS, dayLog: dayLog, generalNotes: generalNotes,
      currDate: fmtISO(currDate), prevDate: fmtISO(prevDate), viewIndex: viewIndex
    }));
  } catch(e) { console.warn('Save failed', e); }
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    var s = JSON.parse(raw);
    if (s.TASKS) { TASKS.length=0; s.TASKS.forEach(function(t){ TASKS.push(t); }); }
    if (s.dayLog) { dayLog.length=0; s.dayLog.forEach(function(d){ dayLog.push(d); }); }
    if (s.generalNotes !== undefined) generalNotes = s.generalNotes;
    if (s.currDate) currDate = localMid(new Date(s.currDate));
    if (s.prevDate) prevDate = localMid(new Date(s.prevDate));
    if (s.viewIndex !== undefined) viewIndex = s.viewIndex;
    return true;
  } catch(e) { return false; }
}

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') saveState();
});
window.addEventListener('pagehide', saveState);

document.getElementById('generalNotesEl').addEventListener('input', function(e) {
  generalNotes = e.target.value;
  debounceSave();
});

// Init
var restored = loadState();
if (!restored) {
  initDates();
} else {
  updateDateDisplay();
  document.getElementById('generalNotesEl').value = generalNotes;
}
if (viewIndex === -1) {
  renderCards(TASKS, false);
} else {
  renderCards(dayLog[viewIndex].tasks, true);
}
</script>
