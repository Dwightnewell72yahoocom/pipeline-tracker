<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pipeline">
<meta name="theme-color" content="#0a1628">
<title>Parsons Pipeline Progress</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root {
  --navy:#0a1628; --navy2:#0f2040; --steel:#1a3a5c;
  --accent:#f59e0b; --muted:#7a9ab8; --text:#e8f0f8;
  --text2:#a0c0d8; --green:#22c55e; --card-bg:#0f2040;
  --border:rgba(255,255,255,0.08);
  --font:'Sora',sans-serif; --mono:'DM Mono',monospace;
}
body.sun {
  --navy:#f0f4f8; --navy2:#ffffff; --steel:#dbeafe;
  --accent:#f59e0b; --muted:#444444; --text:#1a3a5c;
  --text2:#1a3a5c; --green:#15803d; --card-bg:#ffffff;
  --border:#1a3a5c; background:#f0f4f8;
}
body.sun::before { display:none; }
body.sun .header { background:#ffffff; border-bottom:3px solid #1a3a5c; }
body.sun .header::after { display:none; }
body.sun .header-eyebrow { color:#b45309; }
body.sun .header h1 { color:#1a3a5c; }
body.sun .header-sub { color:#444; }
body.sun .date-stepper { background:#dbeafe; border:2px solid #1a3a5c; }
body.sun .step-btn { color:#1a3a5c; font-weight:900; }
body.sun .step-btn:active { background:rgba(26,58,92,0.12); }
body.sun .step-sep { background:#1a3a5c; width:2px; }
body.sun .date-display { color:#1a3a5c; font-weight:700; }
body.sun .date-section { background:#fff; border:2px solid #1a3a5c; }
body.sun .section-divider { background:#1a3a5c; height:2px; }
body.sun .btn { background:#1a3a5c; color:#f59e0b; border:none; }
body.sun .mode-bar { background:#fef3c7; border-color:#f59e0b; color:#92400e; }
body.sun .task-card { background:#fff; border:2px solid #1a3a5c; }
body.sun .task-header { background:#1a3a5c; }
body.sun .task-name-static { color:#fff; }
body.sun input.task-name-input { color:#fff; }
body.sun input.task-name-input:focus { border-bottom-color:#f59e0b; }
body.sun .del-btn { color:rgba(255,255,255,0.7); }
body.sun .card-tabs { background:#e8f0f8; border-bottom:2px solid #1a3a5c; }
body.sun .card-tab { color:#444; font-weight:700; }
body.sun .card-tab.active { color:#1a3a5c; border-bottom-color:#f59e0b; background:#fff; }
body.sun .field-group { border-right:1px solid #cbd5e1; }
body.sun .field-group-title { color:#1a3a5c; }
body.sun .field-label { color:#444; font-weight:700; }
body.sun input.ci { background:#f0f6ff; border:2px solid #1a3a5c; color:#1a3a5c; font-weight:700; }
body.sun input.ci.start { background:#e8f0f8; color:#1a3a5c; }
body.sun input.ci:focus { background:#fff; border-color:#f59e0b; }
body.sun .ci-ro { color:#1a3a5c; border:2px solid #1a3a5c; }
body.sun .ci-ro.start { color:#444; }
body.sun .ci-ro.empty { color:#94a3b8; border-color:#cbd5e1; }
body.sun textarea.notes-input { color:#1a3a5c; }
body.sun textarea.notes-input::placeholder { color:#94a3b8; }
body.sun .notes-ro { color:#1a3a5c; }
body.sun .insert-line { background:#1a3a5c; }
body.sun .insert-btn { color:#1a3a5c; border-color:rgba(26,58,92,0.4); background:rgba(26,58,92,0.06); }
body.sun .general-notes-card { background:#fff; border:2px solid #1a3a5c; }
body.sun .general-notes-header { background:#1a3a5c; }
body.sun textarea.general-notes-input { color:#1a3a5c; }
body.sun .add-task-btn { color:#1a3a5c; border-color:rgba(26,58,92,0.4); background:rgba(26,58,92,0.06); }
body.sun .section-label { color:#1a3a5c; }
body.sun .camera-btn { color:#1a3a5c; border-color:rgba(26,58,92,0.4); background:rgba(26,58,92,0.06); }

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:var(--font); background:var(--navy); color:var(--text); min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(245,158,11,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,158,11,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
.app { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:0 0 80px; }

.sun-toggle { position:fixed; top:12px; right:12px; z-index:1000; background:#1a3a5c; border:none; border-radius:99px; padding:7px 14px; font-size:13px; font-weight:700; color:#f59e0b; cursor:pointer; font-family:var(--font); touch-action:manipulation; box-shadow:0 2px 8px rgba(0,0,0,0.3); display:flex; align-items:center; gap:6px; }
body.sun .sun-toggle { background:#f59e0b; color:#1a3a5c; }

.save-bar { position:fixed; bottom:0; left:0; right:0; z-index:999; display:flex; align-items:center; justify-content:center; padding:8px 16px; font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:0.05em; transition:background 0.3s; }
.save-bar.saved { background:rgba(21,128,61,0.92); color:#bbf7d0; }
.save-bar.saving { background:rgba(180,83,9,0.92); color:#fef3c7; }
.save-bar.error { background:rgba(185,28,28,0.92); color:#fee2e2; }

.header { background:linear-gradient(160deg,var(--navy2) 0%,var(--steel) 100%); padding:56px 20px 24px; border-bottom:1px solid var(--border); position:relative; overflow:hidden; }
.header::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
.header-eyebrow { font-size:10px; font-weight:600; letter-spacing:0.15em; color:var(--accent); text-transform:uppercase; margin-bottom:6px; font-family:var(--mono); }
.header h1 { font-size:22px; font-weight:700; color:var(--text); line-height:1.2; }
.header-sub { font-size:12px; color:var(--muted); margin-top:4px; font-family:var(--mono); }

.date-section { margin:16px; background:var(--card-bg); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
.date-label-row { display:flex; align-items:center; justify-content:space-between; }
.date-label-txt { font-family:var(--mono); font-size:14px; font-weight:600; color:var(--text); }
.yesterday-btn { font-family:var(--font); font-size:12px; font-weight:600; padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:var(--steel); color:var(--text2); cursor:pointer; touch-action:manipulation; }
.yesterday-btn:active { opacity:0.8; }
.yesterday-btn.active { background:var(--accent); color:var(--navy); border-color:var(--accent); }
body.sun .yesterday-btn { background:#e8f0f8; color:#1a3a5c; border-color:#1a3a5c; }
body.sun .yesterday-btn.active { background:var(--accent); color:#1a3a5c; }
.date-inner { padding:14px 16px; }
.date-stepper { display:flex; align-items:stretch; background:var(--steel); border:1px solid var(--border); border-radius:10px; overflow:hidden; height:52px; }
.step-btn { width:56px; background:transparent; border:none; color:var(--accent); font-size:30px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; touch-action:manipulation; }
.step-btn:active { background:rgba(245,158,11,0.22); }
.step-sep { width:1px; background:var(--border); flex-shrink:0; }
.date-display { flex:1; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:13px; color:var(--text); user-select:none; text-align:center; }
.section-divider { height:1px; background:var(--border); }
.btn-row { padding:14px 16px; background:rgba(0,0,0,0.15); }
.btn { width:100%; font-family:var(--font); font-size:14px; font-weight:600; padding:14px; border-radius:10px; border:1px solid rgba(110,231,183,0.2); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; touch-action:manipulation; background:linear-gradient(135deg,#065f46,#047857); color:#6ee7b7; }
.btn:active { opacity:0.85; transform:scale(0.98); }

.mode-bar { display:none; margin:0 16px; padding:8px 14px; background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.2); border-radius:10px; font-family:var(--mono); font-size:11px; color:var(--accent); text-align:center; }
.mode-bar.visible { display:block; }

.section-label { font-size:10px; font-weight:600; letter-spacing:0.15em; color:var(--accent); text-transform:uppercase; font-family:var(--mono); padding:0 16px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
.add-task-btn { font-family:var(--mono); font-size:11px; padding:4px 12px; border-radius:6px; border:1px solid rgba(245,158,11,0.3); background:rgba(245,158,11,0.08); color:var(--accent); cursor:pointer; touch-action:manipulation; text-transform:none; letter-spacing:0; }

.cards { padding:0 16px; display:flex; flex-direction:column; gap:10px; }
.task-card { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.task-card.flash { animation:cardFlash 0.8s ease; }
@keyframes cardFlash { 0% { border-color:var(--green); box-shadow:0 0 0 1px var(--green); } 100% { border-color:var(--border); box-shadow:none; } }
.task-header { padding:10px 14px; background:linear-gradient(90deg,var(--steel),var(--navy2)); display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); }
.task-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }
.task-name-static { font-size:13px; font-weight:600; color:var(--text); }
input.task-name-input { background:transparent; border:none; border-bottom:1px solid transparent; color:var(--text); font-family:var(--font); font-size:13px; font-weight:600; flex:1; outline:none; padding:0; min-width:0; }
input.task-name-input:focus { border-bottom-color:var(--accent); }
.del-btn { margin-left:auto; background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:0 4px; touch-action:manipulation; flex-shrink:0; }
.del-btn:active { color:#ef4444; }

.card-tabs { display:flex; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.15); }
.card-tab { flex:1; padding:8px 4px; font-size:11px; font-weight:600; font-family:var(--mono); text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); text-align:center; cursor:pointer; border:none; background:none; touch-action:manipulation; border-bottom:2px solid transparent; }
.card-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.card-pane { display:none; }
.card-pane.active { display:block; }

.fields { display:grid; grid-template-columns:1fr 1fr; }
.field-group { padding:12px 14px; border-right:1px solid var(--border); }
.field-group:last-child { border-right:none; }
.field-group-title { font-size:10px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:10px; font-family:var(--mono); }
.field-pair { display:flex; flex-direction:column; gap:8px; }
.field-item { display:flex; flex-direction:column; gap:3px; }
.field-label { font-size:10px; color:var(--muted); font-family:var(--mono); text-transform:uppercase; letter-spacing:0.06em; }
input.ci { width:100%; font-size:15px; font-family:var(--mono); border:1px solid var(--border); border-radius:7px; padding:9px 10px; background:var(--navy); color:var(--text); -webkit-appearance:none; }
input.ci.start { background:rgba(0,0,0,0.3); color:var(--text2); }
input.ci:focus { outline:none; border-color:var(--accent); color:var(--text); background:var(--navy2); }
.ci-ro { font-size:15px; font-family:var(--mono); border:1px solid var(--border); border-radius:7px; padding:9px 10px; color:var(--text2); min-height:38px; display:block; }
.ci-ro.start { color:var(--muted); }
.ci-ro.empty { color:var(--steel); }

textarea.notes-input { width:100%; min-height:90px; font-size:13px; font-family:var(--font); padding:12px 14px; background:transparent; border:none; color:var(--text); resize:none; outline:none; line-height:1.5; }
textarea.notes-input::placeholder { color:var(--steel); }
.notes-ro { font-size:13px; padding:12px 14px; color:var(--text2); line-height:1.5; min-height:50px; white-space:pre-wrap; }
.notes-ro.empty { color:var(--steel); font-style:italic; }

.photo-pane-inner { padding:12px 14px; }
.photo-thumb { width:100%; max-height:200px; object-fit:cover; border-radius:8px; border:1px solid var(--border); display:block; }
.photo-retake-btn { margin-top:8px; width:100%; font-family:var(--font); font-size:12px; padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--steel); color:var(--text2); cursor:pointer; touch-action:manipulation; }
.photo-empty { display:flex; flex-direction:column; align-items:center; gap:10px; padding:20px 0; }
.photo-empty-icon { font-size:34px; opacity:0.35; }
.photo-empty-txt { font-size:11px; color:var(--muted); font-family:var(--mono); }
.camera-btn { font-family:var(--font); font-size:13px; font-weight:600; padding:10px 20px; border-radius:10px; border:1px solid rgba(245,158,11,0.3); background:rgba(245,158,11,0.08); color:var(--accent); cursor:pointer; touch-action:manipulation; }
.camera-btn:active { background:rgba(245,158,11,0.2); }
.thumb-badge { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); margin-left:4px; vertical-align:middle; }

.insert-row { display:flex; align-items:center; gap:8px; padding:4px 0; }
.insert-line { flex:1; height:1px; background:var(--border); }
.insert-btn { font-size:11px; font-family:var(--mono); padding:3px 12px; border-radius:99px; border:1px solid rgba(245,158,11,0.25); background:rgba(245,158,11,0.06); color:var(--accent); cursor:pointer; white-space:nowrap; touch-action:manipulation; flex-shrink:0; }

.general-notes-card { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin:0 16px; }
.general-notes-header { padding:10px 14px; background:linear-gradient(90deg,var(--steel),var(--navy2)); display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); }
textarea.general-notes-input { width:100%; min-height:120px; font-size:13px; font-family:var(--font); padding:14px; background:transparent; border:none; color:var(--text); resize:none; outline:none; line-height:1.6; }
textarea.general-notes-input::placeholder { color:var(--steel); }

.report-overlay { display:none; position:fixed; inset:0; background:#fff; z-index:9999; flex-direction:column; }
.report-overlay.open { display:flex; }
.report-toolbar { display:flex; align-items:center; gap:10px; padding:14px 16px; background:#1a3a5c; flex-shrink:0; }
.report-toolbar-title { color:#f59e0b; font-size:13px; font-weight:600; flex:1; font-family:monospace; }
.report-close-btn { background:none; border:1px solid rgba(255,255,255,0.25); color:#fff; font-size:13px; padding:7px 14px; border-radius:8px; cursor:pointer; touch-action:manipulation; }
.report-save-btn { background:#f59e0b; border:none; color:#1a3a5c; font-size:13px; font-weight:700; padding:7px 16px; border-radius:8px; cursor:pointer; touch-action:manipulation; }
.report-body { flex:1; overflow-y:auto; padding:24px 20px; color:#111; font-family:Arial,sans-serif; }
.report-footer-txt { color:#999; font-size:11px; margin-top:20px; padding-top:10px; border-top:1px solid #eee; }
@media print { .report-toolbar { display:none !important; } }

/* PDF Modal */
#pdfModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:99999; align-items:center; justify-content:center; }
#pdfModal.open { display:flex; }
.pdf-modal-box { background:#0f2040; border:1px solid rgba(255,255,255,0.12); border-radius:18px; padding:28px 24px; max-width:320px; width:90%; margin:auto; }
.pdf-modal-title { font-family:var(--font); font-size:16px; font-weight:700; color:#e8f0f8; margin-bottom:4px; }
.pdf-modal-sub { font-family:var(--mono); font-size:11px; color:#7a9ab8; margin-bottom:16px; }
.pdf-modal-divider { height:1px; background:rgba(255,255,255,0.08); margin:14px 0; }
.pdf-modal-section-label { font-family:var(--mono); font-size:10px; color:#7a9ab8; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.1em; }
.pdf-btn { width:100%; margin-bottom:10px; padding:14px; border-radius:10px; border:1px solid rgba(245,158,11,0.3); background:rgba(245,158,11,0.08); color:#f59e0b; font-family:var(--font); font-size:13px; font-weight:600; cursor:pointer; text-align:left; touch-action:manipulation; }
.pdf-btn-plain { width:100%; margin-bottom:10px; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.04); color:#e8f0f8; font-family:var(--font); font-size:12px; font-weight:600; cursor:pointer; text-align:left; touch-action:manipulation; }
.pdf-btn-sub { font-size:11px; font-weight:400; color:#7a9ab8; display:block; margin-top:2px; }
.pdf-cancel-btn { width:100%; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:transparent; color:#7a9ab8; font-family:var(--font); font-size:13px; cursor:pointer; touch-action:manipulation; }
</style>
</head>
<body>

<button class="sun-toggle" id="sunBtn" onclick="toggleSun()">&#9728; Sunlight</button>

<div class="app">
  <div class="header">
    <div class="header-eyebrow">Parsons / Field Report</div>
    <h1>Pipeline Progress</h1>
    <div class="header-sub">Transmission Line Tracker</div>
  </div>

  <div style="height:16px"></div>

  <div class="date-section">
    <div class="date-inner">
      <div class="date-label-row">
        <span class="date-label-txt" id="dateDisplay">Today: --</span>
        <button class="yesterday-btn" id="yesterdayBtn" onclick="toggleYesterday()">View Yesterday</button>
      </div>
    </div>
    <div class="section-divider"></div>
    <div class="btn-row">
      <button class="btn" onclick="showReport()">&#8595; View &amp; Print Report</button>
    </div>
  </div>

  <div style="height:12px"></div>

  <div class="section-label">
    Tasks
    <button class="add-task-btn" onclick="addTask(-1)">+ Add task</button>
  </div>
  <div class="cards" id="cards"></div>

  <div style="height:16px"></div>
  <div class="section-label">General Notes</div>
  <div style="height:6px"></div>
  <div class="general-notes-card">
    <div class="general-notes-header">
      <div class="task-dot"></div>
      <span class="task-name-static">Site / General Notes</span>
    </div>
    <textarea class="general-notes-input" id="generalNotesEl" placeholder="Enter general site notes, observations, issues..."></textarea>
  </div>
</div>

<div class="save-bar saved" id="saveBar">&#10003; Saved</div>

<!-- Report overlay -->
<div class="report-overlay" id="reportOverlay">
  <div class="report-toolbar">
    <span class="report-toolbar-title">Pipeline Report</span>
    <button class="report-close-btn" onclick="closeReport()">X Close</button>
    <button class="report-save-btn" onclick="reportAction()">&#8595; Save PDF</button>
  </div>
  <div class="report-body" id="reportBody"></div>
</div>

<!-- PDF Options Modal -->
<div id="pdfModal">
  <div class="pdf-modal-box">
    <div class="pdf-modal-title">Save Report as PDF</div>
    <div class="pdf-modal-sub">Choose what to include</div>
    <button class="pdf-btn" onclick="generatePDF('full')">
      &#128196; Full Report
      <span class="pdf-btn-sub">Data + Notes + Photos in one PDF</span>
    </button>
    <button class="pdf-btn-plain" onclick="generatePDF('data')">
      &#128203; Data &amp; Notes Only
      <span class="pdf-btn-sub">Progress table and notes, no photos</span>
    </button>
    <button class="pdf-btn-plain" onclick="generatePDF('photos')">
      &#128247; Photos Only
      <span class="pdf-btn-sub">Site photos with task labels</span>
    </button>
    <div class="pdf-modal-divider"></div>
    <div class="pdf-modal-section-label">Copy to clipboard (paste into Word)</div>
    <button class="pdf-btn-plain" onclick="copyToClipboard('full')">
      &#128203; Copy Full Report
      <span class="pdf-btn-sub">Full table + all notes - paste into Word</span>
    </button>
    <button class="pdf-btn-plain" onclick="copyToClipboard('data')">
      &#128196; Copy Data &amp; Notes Only
      <span class="pdf-btn-sub">Table + notes + general notes - paste into Word</span>
    </button>
    <div class="pdf-modal-divider"></div>
    <button class="pdf-cancel-btn" onclick="closePdfModal()">Cancel</button>
  </div>
</div>

<script>
var TASK_NAMES = ['Trenching','Pipelay','Welded','Tested','Sleeved','Diapered','Slurry'];

function blankTask(name) {
  return {name:name, stStart:'', stEnd:'', wjStart:'', wjEnd:'', notes:'', photo:''};
}
function blankTasks() {
  return TASK_NAMES.map(function(n){ return blankTask(n); });
}

var TASKS = blankTasks();
var dayLog = [];
var viewIndex = -1;
var generalNotes = '';
var currDate, prevDate;

// DATE HELPERS
function localMid(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function addDays(d, n) { var r = localMid(d); r.setDate(r.getDate() + n); return r; }
function pad(n) { return String(n).padStart(2, '0'); }
function fmtISO(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }
function fmtNice(d) {
  var D = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return D[d.getDay()] + ' ' + d.getDate() + ' ' + M[d.getMonth()] + ' ' + d.getFullYear();
}

function initDates() {
  currDate = localMid(new Date());
  prevDate = addDays(currDate, -1);
  updateDateDisplay();
}

function updateDateDisplay() {
  var el = document.getElementById('dateDisplay');
  var btn = document.getElementById('yesterdayBtn');
  if (viewIndex === -1) {
    // Today view
    el.innerText = 'Today: ' + fmtNice(currDate);
    if (btn) { btn.innerText = 'View Yesterday'; btn.classList.remove('active'); }
  } else {
    // Yesterday view
    el.innerText = 'Yesterday: ' + dayLog[0].date;
    if (btn) { btn.innerText = 'Back to Today'; btn.classList.add('active'); }
  }
}

// DATE STEPPER
function toggleYesterday() {
  if (viewIndex === -1) {
    // Switch to yesterday view if available
    if (dayLog.length > 0) {
      viewIndex = 0;
      updateDateDisplay();
      renderCards(dayLog[0].tasks, true);
    }
  } else {
    // Return to today
    viewIndex = -1;
    updateDateDisplay();
    renderCards(TASKS, false);
  }
}

// SYNC INPUTS
function syncLiveInputs() {
  document.querySelectorAll('input.ci').forEach(function(inp) {
    if (inp.dataset.i !== undefined) TASKS[+inp.dataset.i][inp.dataset.f] = inp.value;
  });
  document.querySelectorAll('input.task-name-input').forEach(function(inp) {
    if (inp.dataset.i !== undefined) TASKS[+inp.dataset.i].name = inp.value || 'Unnamed';
  });
  document.querySelectorAll('textarea.notes-input').forEach(function(ta) {
    if (ta.dataset.i !== undefined) TASKS[+ta.dataset.i].notes = ta.value;
  });
  var gn = document.getElementById('generalNotesEl');
  if (gn) generalNotes = gn.value;
}

// SAVE AND ADVANCE
function saveAndAdvance() {
  syncLiveInputs();
  // Save snapshot of current day
  var snapshot = {
    prevDate: fmtNice(prevDate),
    date: fmtNice(currDate),
    generalNotes: generalNotes,
    tasks: TASKS.map(function(t) {
      return {
        name: t.name, stStart: t.stStart, stEnd: t.stEnd,
        wjStart: t.wjStart, wjEnd: t.wjEnd, notes: t.notes, photo: t.photo
      };
    })
  };
  // Keep only the most recent snapshot (previous day only)
  dayLog.length = 0;
  dayLog.push(snapshot);

  // Shift end values to start for next day
  var moved = [];
  TASKS.forEach(function(t, i) {
    var hasEnd = t.stEnd || t.wjEnd;
    if (hasEnd) {
      moved.push(i);
      t.stStart = t.stEnd;
      t.stEnd = '';
      t.wjStart = t.wjEnd;
      t.wjEnd = '';
    } else {
      // Keep existing starts intact, just clear ends
      t.stEnd = '';
      t.wjEnd = '';
    }
    // Clear photo and notes for new day
    t.photo = '';
    t.notes = '';
  });

  prevDate = localMid(currDate);
  currDate = addDays(currDate, 1);
  viewIndex = -1;
  updateDateDisplay();
  renderCards(TASKS, false);
  // Record advance date so auto-advance never duplicates it
  try { localStorage.setItem('parsons_lastAdvanced', fmtISO(currDate)); } catch(e) {}
  saveState();

  if (moved.length) {
    document.querySelectorAll('.task-card').forEach(function(el, i) {
      if (moved.indexOf(i) !== -1) {
        el.classList.add('flash');
        setTimeout(function(){ el.classList.remove('flash'); }, 900);
      }
    });
  }
  saveState();
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// TABS
function switchTab(btn, pane) {
  var card = btn.closest('.task-card');
  card.querySelectorAll('.card-tab').forEach(function(t){ t.classList.remove('active'); });
  card.querySelectorAll('.card-pane').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  card.querySelector('[data-pane="'+pane+'"]').classList.add('active');
}

// TASK MANAGEMENT
function addTask(beforeIndex) {
  syncLiveInputs();
  var newTask = blankTask('New task');
  if (beforeIndex === -1) { TASKS.push(newTask); } else { TASKS.splice(beforeIndex, 0, newTask); }
  renderCards(TASKS, false);
  var idx = beforeIndex === -1 ? TASKS.length - 1 : beforeIndex;
  setTimeout(function() {
    var inputs = document.querySelectorAll('input.task-name-input');
    if (inputs[idx]) { inputs[idx].focus(); inputs[idx].select(); }
  }, 50);
  saveState();
}

function deleteTask(i) {
  if (TASKS.length <= 1) { alert('Must have at least one task.'); return; }
  if (!confirm('Remove "' + TASKS[i].name + '"?')) return;
  syncLiveInputs();
  TASKS.splice(i, 1);
  renderCards(TASKS, false);
  saveState();
}

// CAMERA
function triggerCamera(i) {
  var inp = document.getElementById('cam-' + i);
  if (inp) inp.click();
}

function handlePhoto(event, i) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var MAX = 600;
      var scale = Math.min(MAX / img.width, MAX / img.height, 1);
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      TASKS[i].photo = canvas.toDataURL('image/jpeg', 0.6);
      renderCards(TASKS, false);
      setTimeout(function() {
        var cards = document.querySelectorAll('.task-card');
        if (cards[i]) {
          var photoTab = cards[i].querySelectorAll('.card-tab')[2];
          if (photoTab) switchTab(photoTab, 'photo');
        }
      }, 50);
      saveState();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

  syncLiveInputs();
  var activeTasks = viewIndex === -1 ? TASKS : dayLog[viewIndex].tasks;
  var prevStr = viewIndex === -1 ? fmtNice(prevDate) : dayLog[viewIndex].prevDate;
  var currStr = viewIndex === -1 ? fmtNice(currDate) : dayLog[viewIndex].date;
  var gn = viewIndex === -1 ? generalNotes : (dayLog[viewIndex].generalNotes || '');
  var hasNotes = activeTasks.some(function(t){ return t.notes && t.notes.trim(); });
  var photoTasks = activeTasks.filter(function(t){ return t.photo; });

  var doc = new window.jspdf.jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  var pageW = doc.internal.pageSize.getWidth();
  var pageH = doc.internal.pageSize.getHeight();
  var margin = 15;
  var y = margin;

  function addHeader(subtitle) {
    doc.setFillColor(26, 58, 92);
    doc.rect(0, 0, pageW, 28, 'F');
    doc.setTextColor(245, 158, 11);
    doc.setFontSize(20); doc.setFont('helvetica', 'bold');
    doc.text('PARSONS', margin, 12);
    doc.setFontSize(11); doc.setFont('helvetica', 'normal');
    doc.text(subtitle, margin, 20);
    doc.setTextColor(200, 220, 240);
    doc.setFontSize(9);
    doc.text('Previous: ' + prevStr + '   |   Current: ' + currStr, margin, 26);
  }

  function addFooter() {
    doc.setTextColor(150, 150, 150);
    doc.setFontSize(8); doc.setFont('helvetica', 'normal');
    doc.text('Generated: ' + new Date().toLocaleString(), margin, pageH - 8);
  }

  function addDataSection() {
    y = 36;
    var head = [['Task', 'Sta Start', 'Sta End', 'PC Start', 'PC End']];
    if (hasNotes) head[0].push('Notes');
    var body = activeTasks.map(function(t) {
      var row = [t.name, t.stStart||'--', t.stEnd||'--', t.wjStart||'--', t.wjEnd||'--'];
      if (hasNotes) row.push(t.notes || '');
      return row;
    });
    doc.autoTable({
      startY: y, head: head, body: body,
      margin: {left: margin, right: margin},
      styles: {fontSize: 9, cellPadding: 3, valign: 'middle'},
      headStyles: {fillColor:[26,58,92], textColor:[245,158,11], fontStyle:'bold', halign:'center'},
      columnStyles: {
        0: {fontStyle:'bold', halign:'left', cellWidth: hasNotes ? 28 : 36},
        1: {halign:'center', cellWidth:22}, 2: {halign:'center', cellWidth:22},
        3: {halign:'center', cellWidth:22}, 4: {halign:'center', cellWidth:22},
        5: {halign:'left', cellWidth: hasNotes ? 44 : 0}
      },
      alternateRowStyles: {fillColor:[240,246,252]},
      didParseCell: function(data) {
        if (data.row.index % 2 === 0 && data.section === 'body') data.cell.styles.fillColor = [255,255,255];
      }
    });
    y = doc.lastAutoTable.finalY + 8;
    if (gn.trim()) {
      if (y > 240) { doc.addPage(); addFooter(); y = margin; }
      doc.setTextColor(26,58,92); doc.setFontSize(11); doc.setFont('helvetica','bold');
      doc.text('General Notes', margin, y); y += 6;
      doc.setTextColor(60,60,60); doc.setFontSize(9); doc.setFont('helvetica','normal');
      var gnLines = doc.splitTextToSize(gn, pageW - margin * 2);
      doc.text(gnLines, margin, y);
      y += gnLines.length * 5 + 8;
    }
  }

  function addPhotosSection() {
    if (photoTasks.length === 0) {
      if (mode === 'photos') y = 36;
      doc.setTextColor(150,150,150); doc.setFontSize(10); doc.setFont('helvetica','normal');
      doc.text('No photos taken for this date.', margin, y + 10);
      return;
    }
    if (mode === 'photos') y = 36;
    if (y > 200) { doc.addPage(); addFooter(); y = margin; }
    doc.setTextColor(26,58,92); doc.setFontSize(11); doc.setFont('helvetica','bold');
    doc.text('Site Photos', margin, y); y += 8;

    var cols = 2, gutter = 6;
    var cellW = (pageW - margin * 2 - gutter) / 2;
    var labelH = 6, imgH = 55, cellH = labelH + imgH + 4;

    photoTasks.forEach(function(t, idx) {
      var col = idx % cols;
      var rowInPage = Math.floor(idx / cols) % 2;
      if (idx > 0 && idx % 4 === 0) {
        doc.addPage(); addFooter(); y = margin;
        doc.setTextColor(26,58,92); doc.setFontSize(11); doc.setFont('helvetica','bold');
        doc.text('Site Photos (continued)', margin, y); y += 8;
      }
      var x = margin + col * (cellW + gutter);
      var cellY = y + rowInPage * (cellH + gutter);
      doc.setTextColor(26,58,92); doc.setFontSize(9); doc.setFont('helvetica','bold');
      doc.text(t.name, x, cellY + 4, {maxWidth: cellW});
      try {
        doc.addImage(t.photo, 'JPEG', x, cellY + labelH, cellW, imgH, '', 'FAST');
      } catch(e) {
        doc.setTextColor(150,150,150); doc.setFontSize(8); doc.setFont('helvetica','normal');
        doc.text('[Photo unavailable]', x, cellY + labelH + imgH / 2);
      }
      if ((idx + 1) % 4 === 0) { y = margin + 16; }
      else if (idx === photoTasks.length - 1) { y += (rowInPage + 1) * (cellH + gutter) + 4; }
    });
  }

  if (mode === 'full') {
    addHeader('Pipeline Progress Report - Full');
    addDataSection(); addPhotosSection(); addFooter();
    doc.save('Parsons_Pipeline_Full_' + fmtISO(currDate) + '.pdf');
  } else if (mode === 'data') {
    addHeader('Pipeline Progress Report - Data & Notes');
    addDataSection(); addFooter();
    doc.save('Parsons_Pipeline_Data_' + fmtISO(currDate) + '.pdf');
  } else if (mode === 'photos') {
    addHeader('Pipeline Progress Report - Site Photos');
    addPhotosSection(); addFooter();
    doc.save('Parsons_Pipeline_Photos_' + fmtISO(currDate) + '.pdf');
  }
}

// PERSISTENCE - photos stored separately to avoid size limits
var STORAGE_KEY = 'parsons_v5';
var saveTimer = null;

function setSaveStatus(status, msg) {
  var bar = document.getElementById('saveBar');
  if (!bar) return;
  bar.className = 'save-bar ' + status;
  bar.innerHTML = msg;
}

function debounceSave() {
  setSaveStatus('saving', '&#8635; Saving...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 300);
}

function cleanOldStorage() {
  // Remove any old version keys and stale photo keys
  var keysToRemove = [];
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && (k.indexOf('parsons_v1') === 0 || k.indexOf('parsons_v2') === 0 ||
              k.indexOf('parsons_v3') === 0 || k.indexOf('parsons_v4') === 0)) {
      keysToRemove.push(k);
    }
  }
  keysToRemove.forEach(function(k){ try { localStorage.removeItem(k); } catch(e){} });
  // Remove stale photo slots beyond current task count
  for (var j = TASKS.length; j < 20; j++) {
    try { localStorage.removeItem(STORAGE_KEY + '_p_' + j); } catch(e) {}
  }
}

function saveState() {
  try {
    syncLiveInputs();
    // Clean old storage first to free space
    cleanOldStorage();
    // Save task data WITHOUT photos
    var taskData = TASKS.map(function(t) {
      return {name:t.name, stStart:t.stStart, stEnd:t.stEnd, wjStart:t.wjStart, wjEnd:t.wjEnd, notes:t.notes};
    });
    // Save day log WITHOUT photos (only keep last 14 days to save space)
    var recentLog = dayLog.slice(-14);
    var dayLogData = recentLog.map(function(d) {
      return {
        prevDate: d.prevDate, date: d.date, generalNotes: d.generalNotes || '',
        tasks: d.tasks.map(function(t) {
          return {name:t.name, stStart:t.stStart, stEnd:t.stEnd, wjStart:t.wjStart, wjEnd:t.wjEnd, notes:t.notes};
        })
      };
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      TASKS: taskData, dayLog: dayLogData, generalNotes: generalNotes,
      currDate: fmtISO(currDate), prevDate: fmtISO(prevDate), viewIndex: viewIndex
    }));
    // Save each photo separately - compress aggressively if needed
    TASKS.forEach(function(t, i) {
      try {
        if (t.photo) {
          localStorage.setItem(STORAGE_KEY + '_p_' + i, t.photo);
        } else {
          localStorage.removeItem(STORAGE_KEY + '_p_' + i);
        }
      } catch(e) {
        // If photo save fails due to quota, remove it and continue
        try { localStorage.removeItem(STORAGE_KEY + '_p_' + i); } catch(e2) {}
        console.warn('Photo save failed task', i, '- skipped');
      }
    });
    var t = new Date();
    var h = t.getHours(), mi = String(t.getMinutes()).padStart(2,'0');
    var ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
    setSaveStatus('saved', '&#10003; Saved ' + h + ':' + mi + ' ' + ap);
  } catch(e) {
    console.warn('Save failed', e);
    setSaveStatus('error', '&#9888; Save failed - tap to retry');
    var bar = document.getElementById('saveBar');
    if (bar) bar.onclick = function(){ saveState(); this.onclick = null; };
  }
}

function loadState() {
  try {
    // Try new key first, fall back to old keys if needed
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      // Try to migrate from old versions
      raw = localStorage.getItem('parsons_v3') || localStorage.getItem('parsons_v2') || localStorage.getItem('parsons_v1');
    }
    if (!raw) return false;
    var s = JSON.parse(raw);
    if (s.TASKS) {
      TASKS.length = 0;
      s.TASKS.forEach(function(t, i) {
        var photo = '';
        try { photo = localStorage.getItem(STORAGE_KEY + '_p_' + i) || ''; } catch(e) {}
        TASKS.push({name:t.name, stStart:t.stStart, stEnd:t.stEnd, wjStart:t.wjStart, wjEnd:t.wjEnd, notes:t.notes, photo:photo});
      });
    }
    if (s.dayLog && s.dayLog.length > 0) {
      dayLog.length = 0;
      // Only keep the most recent entry if its date is valid (not future, not too old)
      var lastEntry = s.dayLog[s.dayLog.length - 1];
      var today = localMid(new Date());
      var entryDate = lastEntry.date ? new Date(lastEntry.date) : null;
      var isValid = entryDate && !isNaN(entryDate) && entryDate <= today;
      if (isValid) {
        dayLog.push({
          prevDate: lastEntry.prevDate, date: lastEntry.date, generalNotes: lastEntry.generalNotes || '',
          tasks: lastEntry.tasks.map(function(t) {
            return {name:t.name, stStart:t.stStart, stEnd:t.stEnd, wjStart:t.wjStart, wjEnd:t.wjEnd, notes:t.notes, photo:''};
          })
        });
      }
      // If invalid date - discard silently, no history shown
    }
    if (s.generalNotes !== undefined) generalNotes = s.generalNotes;
    if (s.currDate) {
      var savedCurr = localMid(new Date(s.currDate));
      var todayCheck = localMid(new Date());
      // If saved date is in the future, reset to today
      currDate = (savedCurr > todayCheck) ? todayCheck : savedCurr;
    }
    if (s.prevDate) {
      var savedPrev = localMid(new Date(s.prevDate));
      prevDate = addDays(currDate, -1);
    }
    if (s.viewIndex !== undefined) viewIndex = s.viewIndex;
    return true;
  } catch(e) { console.warn('Load failed', e); return false; }
}

// Save when app goes to background - critical for iPhone
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') saveState();
});
window.addEventListener('pagehide', saveState);
window.addEventListener('beforeunload', saveState);

document.getElementById('generalNotesEl').addEventListener('input', function(e) {
  generalNotes = e.target.value;
  debounceSave();
});

// SUNLIGHT MODE
function toggleSun() {
  var isSun = document.body.classList.toggle('sun');
  document.getElementById('sunBtn').innerHTML = isSun ? '&#9790; Night' : '&#9728; Sunlight';
  try { localStorage.setItem('parsons_sun', isSun ? '1' : '0'); } catch(e) {}
}

// INIT
// Force wipe ALL old storage keys on this version upgrade
try {
  var wipeVersion = 'parsons_wiped_v19';
  if (!localStorage.getItem(wipeVersion)) {
    // First time running v19 - clear everything parsons related
    var allKeys = [];
    for (var ki = 0; ki < localStorage.length; ki++) {
      var kk = localStorage.key(ki);
      if (kk && kk.indexOf('parsons') === 0) allKeys.push(kk);
    }
    allKeys.forEach(function(k){ localStorage.removeItem(k); });
    localStorage.setItem(wipeVersion, '1');
  }
} catch(e) {}
try { cleanOldStorage(); } catch(e) {}
var restored = loadState();
if (!restored) {
  initDates();
} else {
  updateDateDisplay();
  document.getElementById('generalNotesEl').value = generalNotes;

  // Auto-advance only if:
  // 1. The saved date is from a PREVIOUS day (not today)
  // 2. We have NOT already advanced today (checked via lastAdvancedDate flag)
  var today = localMid(new Date());
  var todayISO = fmtISO(today);
  var lastAdvanced = '';
  try { lastAdvanced = localStorage.getItem('parsons_lastAdvanced') || ''; } catch(e) {}

  if (currDate < today && lastAdvanced !== todayISO) {
    // Save current state as previous day snapshot
    var snapshot = {
      prevDate: fmtNice(prevDate),
      date: fmtNice(currDate),
      generalNotes: generalNotes,
      tasks: TASKS.map(function(t) {
        return {name:t.name, stStart:t.stStart, stEnd:t.stEnd,
                wjStart:t.wjStart, wjEnd:t.wjEnd, notes:t.notes, photo:t.photo};
      })
    };
    dayLog.length = 0;
    dayLog.push(snapshot);
    // Shift ends to starts
    TASKS.forEach(function(t) {
      var hasEnd = t.stEnd || t.wjEnd;
      if (hasEnd) {
        t.stStart = t.stEnd; t.stEnd = '';
        t.wjStart = t.wjEnd; t.wjEnd = '';
      } else {
        t.stEnd = ''; t.wjEnd = '';
      }
      t.photo = '';
      t.notes = '';
    });
    // Set dates to today
    prevDate = localMid(currDate);
    currDate = today;
    viewIndex = -1;
    // Record that we advanced today so it never runs again today
    try { localStorage.setItem('parsons_lastAdvanced', todayISO); } catch(e) {}
    saveState();
  }
}
if (viewIndex === -1) { renderCards(TASKS, false); }
else { renderCards(dayLog[viewIndex].tasks, true); }

// Restore sunlight preference
try {
  if (localStorage.getItem('parsons_sun') === '1') {
    document.body.classList.add('sun');
    document.getElementById('sunBtn').innerHTML = '&#9790; Night';
  }
} catch(e) {}
</script>

    navigator.serviceWorker.register('./sw.js').catch(function(e){ console.log('SW error', e); });
  });
